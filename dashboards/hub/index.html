<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CLAWMODE // HUB</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg0:#08090d; --text:#d7e3e0; --dim:#6b7a78; --panel: rgba(14,18,24,0.7); }
  * { box-sizing:border-box; margin:0; padding:0; }
  html,body { background: var(--bg0); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; }
  body::before {
    content:''; position:fixed; inset:0; pointer-events:none;
    background:
      radial-gradient(circle at 20% 10%, rgba(91,127,255,0.08), transparent 45%),
      radial-gradient(circle at 80% 80%, rgba(0,245,160,0.06), transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(255,120,73,0.04), transparent 60%);
  }
  body::after {
    content:''; position:fixed; inset:0; pointer-events:none;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 3px);
    mix-blend-mode: overlay;
  }
  .wrap { position: relative; z-index:2; max-width:1400px; margin:0 auto; padding: 60px 40px; }
  header { display:flex; align-items:center; justify-content:space-between; border:1px solid rgba(255,255,255,0.08); background:var(--panel); backdrop-filter: blur(14px); padding:22px 30px; border-radius:4px; position:relative; }
  header::before,header::after { content:''; position:absolute; width:14px; height:14px; border:1px solid rgba(255,255,255,0.3); }
  header::before { top:-1px; left:-1px; border-right:none; border-bottom:none; }
  header::after { bottom:-1px; right:-1px; border-left:none; border-top:none; }
  h1 { font-size:22px; font-weight:600; letter-spacing:5px; }
  .sub { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:2px; text-transform:uppercase; margin-top:4px; }
  .status { font-family:'JetBrains Mono',monospace; font-size:11px; color: var(--dim); letter-spacing:1.5px; text-transform:uppercase; }
  .status b { color:#00f5a0; }

  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px; margin-top:36px; }
  .card {
    display:block; text-decoration:none; color:inherit; position:relative;
    border:1px solid rgba(255,255,255,0.08); background:var(--panel); backdrop-filter: blur(14px);
    padding:24px 26px; border-radius:4px; transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  }
  .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background: var(--c); box-shadow: 0 0 12px var(--c); }
  .card::after { content:''; position:absolute; top:-1px; right:-1px; width:10px; height:10px; border-right:1px solid var(--c); border-top:1px solid var(--c); }
  .card:hover { transform: translateY(-2px); border-color: var(--c); box-shadow: 0 0 32px rgba(0,0,0,0.5), 0 0 22px var(--cdim); }
  .card h3 { font-size:16px; font-weight:600; letter-spacing:3px; color: var(--c); text-shadow: 0 0 14px var(--cdim); text-transform:uppercase; }
  .card .role { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--dim); letter-spacing:1.6px; margin-top:6px; text-transform:uppercase; }
  .card .desc { font-size:13px; color:var(--text); margin-top:14px; line-height:1.6; opacity:.85; }
  .card .launch { font-family:'JetBrains Mono', monospace; font-size:10px; color:var(--c); letter-spacing:2px; margin-top:18px; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  .card .launch::after { content: '→'; font-size:13px; }

  .empty { grid-column: 1 / -1; text-align:center; padding:60px; color: var(--dim); font-family:'JetBrains Mono',monospace; letter-spacing:2px; border:1px dashed rgba(255,255,255,0.1); border-radius:4px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>CLAWMODE // HUB</h1>
      <div class="sub">Agent Launcher // Select Target</div>
    </div>
    <div class="status">Active agents: <b id="activeCount">--</b></div>
  </header>
  <div class="grid" id="grid"></div>
</div>

<script>
  const AGENT_REGISTRY = {
    polymarket: {
      name: 'Scout',
      slug: 'polymarket',
      role: 'Prediction Markets',
      color: '#00f5a0',
      description: 'Polymarket trading intelligence. Tracks positions, P&L, and live market signal on Polygon.'
    },
    scout: {
      name: 'Scout',
      slug: 'scout',
      role: 'Research / Intelligence',
      color: '#5b7fff',
      description: 'Open-source intelligence agent. Research, source triangulation, report synthesis.'
    },
    milo: {
      name: 'Milo',
      slug: 'milo',
      role: 'Content / Social',
      color: '#ff7849',
      description: 'Content and social media agent. Drafts posts, schedules, monitors engagement.'
    },
    penny: {
      name: 'Penny',
      slug: 'penny',
      role: 'Finance / Bookkeeping',
      color: '#ffc048',
      description: 'Bookkeeping and financial operations. Reconciliation, invoicing, reporting.'
    },
    dash: {
      name: 'Dash',
      slug: 'dash',
      role: 'Project Management',
      color: '#a855f7',
      description: 'Project coordination and task orchestration across the agent fleet.'
    },
    alex: {
      name: 'Alex',
      slug: 'alex',
      role: 'Lead Gen / Outreach',
      color: '#06d6a0',
      description: 'Prospecting, enrichment, and outbound outreach across channels.'
    }
  };

  // Replaced at deploy time: e.g. "polymarket,scout"
  const AGENTS_RAW = '__CLAWMODE_AGENTS_PLACEHOLDER__';
  const active = (AGENTS_RAW && !AGENTS_RAW.includes('PLACEHOLDER'))
    ? AGENTS_RAW.split(',').map(s => s.trim()).filter(Boolean)
    : Object.keys(AGENT_REGISTRY);

  const grid = document.getElementById('grid');
  const shown = active.filter(slug => AGENT_REGISTRY[slug]);
  document.getElementById('activeCount').textContent = shown.length;

  if (!shown.length) {
    grid.innerHTML = '<div class="empty">No active agents configured.</div>';
  } else {
    for (const slug of shown) {
      const a = AGENT_REGISTRY[slug];
      const hex = a.color.replace('#','');
      const dim = 'rgba(' + parseInt(hex.slice(0,2),16) + ',' + parseInt(hex.slice(2,4),16) + ',' + parseInt(hex.slice(4,6),16) + ',0.3)';
      const card = document.createElement('a');
      card.className = 'card';
      card.href = '/' + a.slug + '/';
      card.style.setProperty('--c', a.color);
      card.style.setProperty('--cdim', dim);
      card.innerHTML = '<h3>' + a.name + ' // ' + a.slug.toUpperCase() + '</h3>'
        + '<div class="role">' + a.role + '</div>'
        + '<div class="desc">' + a.description + '</div>'
        + '<div class="launch">Launch dashboard</div>';
      grid.appendChild(card);
    }
  }
</script>
</body>
</html>
